<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finalizar Inscrição - Tharcísio Rodrigues</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            serif: ['Playfair Display', 'ui-serif', 'Georgia', 'serif'],
          },
          colors: {
            gold: {
              400: '#d4af37',
              500: '#b5952f',
              600: '#9c8028',
            }
          }
        }
      }
    }
  </script>

  <style>
    .fade-up { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body class="bg-zinc-50 font-sans text-zinc-900 selection:bg-gold-400/30">

  <header class="py-6 border-b border-zinc-100 bg-white">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <div class="font-serif text-xl tracking-wide font-medium">
        Tharcísio <span class="text-gold-500">Rodrigues</span>
      </div>
      <span class="text-[10px] uppercase tracking-[0.2em] text-zinc-400">Checkout Seguro</span>
    </div>
  </header>

  <main class="py-12 md:py-20 px-6">
    <div class="max-w-5xl mx-auto">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
        
        <div class="lg:col-span-5 order-2 lg:order-1 fade-up" id="summary">
          <div class="bg-white p-8 border border-zinc-200 shadow-sm sticky top-24">
            <h2 class="font-serif text-2xl mb-6 italic text-zinc-800">Escolha seu plano</h2>
            
            <div class="space-y-4">
              <label class="block cursor-pointer group">
                <input type="radio" name="plan" value="67" class="hidden peer" checked onchange="updatePrice('67,00', 'Mensal')">
                <div class="p-4 border border-zinc-200 peer-checked:border-gold-500 peer-checked:bg-zinc-50 transition-all">
                  <div class="flex justify-between items-center">
                    <span class="text-sm font-semibold uppercase tracking-widest">Assinatura Mensal</span>
                    <span class="text-gold-600 font-medium">R$ 67,00</span>
                  </div>
                  <p class="text-[10px] text-zinc-500 mt-1 uppercase tracking-tighter italic">Pagamento recorrente mês a mês</p>
                </div>
              </label>

              <label class="block cursor-pointer group">
                <input type="radio" name="plan" value="547" class="hidden peer" onchange="updatePrice('547,00', 'Total (10 meses)')">
                <div class="p-4 border border-zinc-200 peer-checked:border-gold-500 peer-checked:bg-zinc-50 transition-all relative">
                  <div class="absolute -top-2 right-2 bg-zinc-900 text-white text-[8px] px-2 py-0.5 font-bold uppercase tracking-widest">Melhor Valor</div>
                  <div class="flex justify-between items-center">
                    <span class="text-sm font-semibold uppercase tracking-widest">Acesso Total (10 meses)</span>
                    <span class="text-gold-600 font-medium">R$ 547,00</span>
                  </div>
                  <p class="text-[10px] text-zinc-500 mt-1 uppercase tracking-tighter italic">Quitação completa do curso com desconto</p>
                </div>
              </label>
            </div>

            <div class="mt-8 border-t border-zinc-100 pt-6">
              <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-400 mb-4">O que está incluso:</h3>
              <ul class="space-y-3">
                <li class="flex items-center gap-2 text-sm text-zinc-600">
                  <svg class="text-gold-500" width="16" height="16" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg>
                  Acesso aos 10 meses de encontros ao vivo
                </li>
                <li class="flex items-center gap-2 text-sm text-zinc-600">
                  <svg class="text-gold-500" width="16" height="16" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg>
                  Materiais de apoio e certificados inclusos
                </li>
              </ul>
            </div>

            <div class="flex justify-between items-center text-xl font-serif border-t border-zinc-200 mt-8 pt-6">
              <span>Total hoje</span>
              <span id="display-price" class="text-gold-600">R$ 67,00</span>
            </div>
          </div>
        </div>

        <div class="lg:col-span-7 order-1 lg:order-2 fade-up">
          <div class="mb-10">
            <h1 class="font-serif text-4xl mb-4">Informações do Aluno</h1>
            <p class="text-zinc-500 font-light italic">Insira os dados que serão usados para o seu acesso e suporte.</p>
          </div>

          <form action="#" class="space-y-8">
            <div class="space-y-4">
              <h3 class="text-[10px] uppercase tracking-[0.3em] text-gold-600 font-bold">Identificação</h3>
              <input type="text" placeholder="Nome Completo" class="w-full p-4 bg-white border border-zinc-200 focus:border-gold-500 outline-none transition-all font-light" required>
              <input type="email" placeholder="Seu melhor e-mail" class="w-full p-4 bg-white border border-zinc-200 focus:border-gold-500 outline-none transition-all font-light" required>
              <input type="tel" placeholder="WhatsApp (DDD + Número)" class="w-full p-4 bg-white border border-zinc-200 focus:border-gold-500 outline-none transition-all font-light" required>
            </div>

            <div class="pt-6">
              <button type="submit" class="w-full bg-zinc-900 text-white py-6 text-sm font-bold uppercase tracking-[0.2em] hover:bg-gold-500 transition-all duration-500 shadow-xl">
                Prosseguir para Pagamento
              </button>
              <div class="flex items-center justify-center gap-4 mt-6 grayscale opacity-50">
                 <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa" class="h-4">
                 <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard" class="h-6">
                 <img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Logo_Pix.png" alt="Pix" class="h-4">
              </div>
            </div>
          </form>
        </div>

      </div>
    </div>
  </main>

  <script>
    function updatePrice(price, planName) {
      document.getElementById('display-price').innerText = 'R$ ' + price;
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
  </script>
</body>
</html>
